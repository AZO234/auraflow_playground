# prompt.toml - AuraFlow/AulaFlow 向けプロンプト構成。
# build_prompt() が各セクションから抽選し、カンマで連結して prompt を作る。
# Danbooru 風のタグ羅列ではなく、AuraFlow が解釈しやすい自然な英語の句を中心にする。
#
# who         : [description, weight, has_wearing, has_motion, has_where, many, lora_keywords]
# wearing     : [clothing, weight, lora_keywords]
# with_items  : [item_or_detail, weight, lora_keywords]
# motion      : [pose_or_action, weight, lora_keywords]
# at          : [place, weight, lora_keywords]
#
# has_wearing / has_motion / has_where が true の who は、対応セクションの抽選をスキップする。
# many=true は複数人物向けの横長キャンバス指定に使われる。

who = [
    # neutral portraits and poses
    ["**An adult woman poses calmly for a full-body photographic scene.**", 20, false, false, false, false, ""],
    ["**Two adult women pose together in a balanced full-body composition.**", 12, false, false, false, true, ""],
]

# 生成側で "nothing" は naked として扱われ、それ以外は "wearing {clothing}" になる。
wearing = [
    ["a dress", 22, "dress"],
]

# 生成側で "nothing" は無視され、それ以外は "with {item}" になる。
with_items = [
    ["nothing", 70, ""],
]

motion = [
    ["standing with relaxed posture", 45, ""],
    ["squatting with balanced posture", 35, "squat"],
    ["sitting with the full body visible", 35, ""],
    ["leaning forward naturally", 30, ""],
    ["standing while turning her back toward the camera", 16, ""],
    ["sitting while turning her back toward the camera", 14, ""],
    ["lying down with the whole body in frame", 18, ""],
]

at = [
    ["a quiet room", 30, ""],
    ["a beach", 5, ""],
    ["a couch", 10, ""],
    ["a bed in a private room", 10, ""],
    ["a hotel bed", 10, ""],
    ["a modern bathroom", 6, ""],
]

lighting = [
    "soft white lighting with natural shadows",
    "colored cinematic lighting with realistic skin tones",
]

positive_always = "A photorealistic full-body 35mm photograph, head to toe in frame, the subject standing far enough from the camera to show the whole body, natural body proportions, anatomically correct body, realistic detailed skin with visible pores, natural color, sharp focus, detailed face, clear symmetric eyes, detailed hands with five fingers, natural hand pose, large breasts, coherent perspective, realistic lighting."

# Pony V7 モード (--pony / GUI Pony トグル) のときだけ positive 先頭に付加される quality/score タグ。
# base AuraFlow では無視される。Pony 系の score タグ規約に合わせて調整可。
pony_prefix = "score_9, score_8_up, score_7_up, source_photo, realistic"

negative_always = "close-up, portrait, head shot, bust shot, upper body only, cropped body, out of frame, face only, anime, cartoon, illustration, 3d render, cel shading, synthetic body, low resolution, bad anatomy, malformed body, mismatched upper and lower body, deformed limbs, extra arms, extra hands, missing hands, extra fingers, missing fingers, malformed feet, extra feet, missing feet, duplicate person, clone, repeated body, collage, panels, grid, tiling, seamless pattern, liquids emerging from hands, liquids emerging from objects unnaturally."
